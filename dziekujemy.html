<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dziękujemy | Akademia TSL</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f7f8fa;
      color: #102f52;
    }

    .card {
      width: 100%;
      max-width: 680px;
      padding: 48px 32px;
      text-align: center;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 16px 45px rgba(16, 47, 82, 0.12);
    }

    .label {
      margin-bottom: 14px;
      color: #f47721;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(34px, 6vw, 52px);
      line-height: 1.1;
    }

    p {
      margin: 0 auto 30px;
      max-width: 520px;
      color: #5d6b7b;
      font-size: 18px;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      padding: 16px 28px;
      color: #ffffff;
      background: #f47721;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
    }

    .button:hover {
      opacity: 0.9;
    }

    .back {
      display: block;
      margin-top: 22px;
      color: #102f52;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="label">Akademia TSL</div>

    <h1>Dziękujemy!</h1>

    <p>
      Twoje zgłoszenie zostało zapisane. Kliknij poniżej,
      aby pobrać bezpłatny poradnik.
    </p>

   <a
  class="button"
  href="/7-zapisow-w-zleceniu-transportowym.pdf"
  download
>
  Pobierz poradnik PDF
</a>

    <a class="back" href="/">
      Wróć na stronę główną
    </a>
  </main>
</body>
</html>
